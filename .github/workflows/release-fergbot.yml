name: Release FergBot

on:
  push:
    tags:
      - "fergbot-v*"

permissions:
  contents: write

jobs:
  build-goosed:
    name: Build goosed (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cross
        run: source ./bin/activate-hermit && cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu-goosed

      - name: Build goosed
        env:
          CROSS_NO_WARNINGS: 0
        run: |
          source ./bin/activate-hermit
          export TARGET="x86_64-unknown-linux-gnu"
          export CC="gcc-10"
          rustup target add "${TARGET}"
          cross build --release --target ${TARGET} -p goose-server

      - name: Package
        run: |
          export TARGET="x86_64-unknown-linux-gnu"
          mkdir -p staging
          cp "target/${TARGET}/release/goosed" staging/
          tar -cjf goosed-x86_64-linux.tar.bz2 -C staging .

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: goosed-x86_64-linux.tar.bz2
          allowUpdates: true
          omitBody: true
